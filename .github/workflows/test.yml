          echo "Unknown flag handled OK"

      - name: Run real scan on test domain
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          bash scan.sh scanme.nmap.org -p 443 -t 30 || {
            echo "FAIL: real scan failed on RedHat"
            exit 1
          }

  # ── Test on Arch Linux container ────────────────────────────
  test-arch:
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
