name: Cross-platform Dependency Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ── Test on real macOS machine ──────────────────────────────
  test-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check OS detection
        run: |
          echo "OS: $(uname -a)"
          sw_vers

      - name: Test detect_os returns macos
        run: |
          output=$(bash -c '
            source ./scan.sh 2>/dev/null || true
            detect_os
          ' 2>/dev/null || true)
          echo "detect_os returned: $output"
          if [ "$output" != "macos" ]; then
            echo "FAIL: expected macos but got $output"
            exit 1
          fi
          echo "detect_os OK"

      - name: Verify brew is available
        run: |
          if ! command -v brew; then
            echo "FAIL: brew not found"
            exit 1
          fi
          echo "brew OK"

      - name: Install Go first
        run: |
          HOMEBREW_NO_AUTO_UPDATE=1 brew install go || {
            echo "FAIL: go install failed"
            exit 1
          }

      - name: Run scan.sh check_dependencies — answer y to all prompts
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          printf 'y\ny\n' | bash -c '
            source ./scan.sh 2>/dev/null || true
            check_dependencies
          ' && echo "All dependency checks passed" || {
            echo "FAIL: dependency check failed"
            exit 1
          }

      - name: Verify ALL tools are present — fail if any missing
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          ALL_OK=true
          for tool in subfinder dnsx httpx jq python3 openssl ssh-audit dig timeout; do
            if command -v "$tool" > /dev/null 2>&1; then
              echo "  ✓ $tool found at $(command -v $tool)"
            else
              echo "  ✗ FAIL: $tool not found"
              ALL_OK=false
            fi
          done
          if [ "$ALL_OK" = "false" ]; then
            echo "FAIL: one or more tools are missing"
            exit 1
          fi
          echo "All tools verified OK"

      - name: Test help flag
        run: bash scan.sh --help

      - name: Test version flag
        run: bash scan.sh --version

      - name: Test missing domain error
        run: |
          output=$(bash scan.sh 2>&1 || true)
          echo "$output"
          if ! echo "$output" | grep -q "Usage"; then
            echo "FAIL: expected Usage message when no domain given"
            exit 1
          fi
          echo "Missing domain handled OK"

      - name: Test invalid domain
        run: |
          output=$(bash scan.sh "invalid!!domain" 2>&1 || true)
          echo "$output"
          if ! echo "$output" | grep -q "Error"; then
            echo "FAIL: expected Error message for invalid domain"
            exit 1
          fi
          echo "Invalid domain handled OK"

      - name: Test unknown flag
        run: |
          output=$(bash scan.sh --fakeflag 2>&1 || true)
          echo "$output"
          if ! echo "$output" | grep -q "Error"; then
            echo "FAIL: expected Error message for unknown flag"
            exit 1
          fi
          echo "Unknown flag handled OK"

      - name: Run real scan on test domain
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          bash scan.sh scanme.nmap.org -p 443 -t 30 || {
            echo "FAIL: real scan failed on macOS"
            exit 1
          }

  # ── Test on real Ubuntu machine ─────────────────────────────
